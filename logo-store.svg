<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96" width="100%" height="100%">
  <defs>
    <linearGradient id="pinShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.15)"/>
    </linearGradient>
    <linearGradient id="storeBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="doorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C1010"/>
      <stop offset="100%" stop-color="#3A0808"/>
    </linearGradient>
    <filter id="pinShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="40" cy="88" rx="18" ry="5" fill="rgba(0,0,0,0.15)"/>

  <!-- Pin shape (teardrop) -->
  <path d="M40 2 C44 2 70 22 76 38 C80 48 78 52 72 56 L44 82 C42 84 38 84 36 82 L8 56 C2 52 0 48 4 38 C10 22 36 2 40 2 Z"
        fill="url(#storeBody)" filter="url(#pinShadow)"/>

  <!-- 3D shine on pin -->
  <path d="M40 2 C44 2 70 22 76 38 C80 48 78 52 72 56 L44 82 C42 84 38 84 36 82 L8 56 C2 52 0 48 4 38 C10 22 36 2 40 2 Z"
        fill="url(#pinShine)"/>

  <!-- White awning base -->
  <path d="M18 32 L62 32 L68 28 L12 28 Z" fill="#fff"/>
  <path d="M12 28 L68 28 L72 24 L8 24 Z" fill="#F5F5F5"/>

  <!-- Red awning stripes -->
  <path d="M20 24 L26 24 L24 32 L18 32 Z" fill="#C62828"/>
  <path d="M30 24 L36 24 L34 32 L28 32 Z" fill="#C62828"/>
  <path d="M40 24 L46 24 L44 32 L38 32 Z" fill="#C62828"/>
  <path d="M50 24 L56 24 L54 32 L48 32 Z" fill="#C62828"/>

  <!-- Awning 3D shadow line -->
  <line x1="12" y1="32" x2="68" y2="32" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>

  <!-- Storefront body -->
  <rect x="20" y="32" width="40" height="32" rx="1" fill="url(#storeBody)"/>

  <!-- Warm window light - left -->
  <rect x="22" y="34" width="12" height="8" rx="1.5" fill="rgba(255,200,50,0.35)"/>
  <rect x="22" y="34" width="12" height="8" rx="1.5" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <line x1="28" y1="34" x2="28" y2="42" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- Warm window light - right -->
  <rect x="46" y="34" width="12" height="8" rx="1.5" fill="rgba(255,200,50,0.35)"/>
  <rect x="46" y="34" width="12" height="8" rx="1.5" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <line x1="52" y1="34" x2="52" y2="42" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- OPEN sign -->
  <rect x="34" y="36" width="12" height="4" rx="1" fill="rgba(255,215,0,0.5)"/>
  <text x="40" y="39" text-anchor="middle" font-size="2.8" font-weight="700" fill="#fff" font-family="sans-serif">OPEN</text>

  <!-- Door -->
  <path d="M32 46 L32 64 L48 64 L48 46 Q40 42 32 46 Z" fill="url(#doorGrad)"/>
  <path d="M32 46 L32 64 L48 64 L48 46 Q40 42 32 46 Z" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- Door window -->
  <rect x="36" y="50" width="8" height="6" rx="1" fill="rgba(255,200,50,0.15)"/>

  <!-- Door handle -->
  <circle cx="44" cy="57" r="1.5" fill="rgba(255,255,255,0.25)"/>

  <!-- Doorstep -->
  <rect x="30" y="63" width="20" height="2" rx="0.5" fill="#4A0A0A"/>

  <!-- Small decorative elements -->
  <line x1="40" y1="44" x2="40" y2="46" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
</svg>
